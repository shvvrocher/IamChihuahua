<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>치와와 필터</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: sans-serif;
    color: #fff;
    overflow: hidden;
  }
  #startScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    position: absolute;
    z-index: 10;
  }
  #startScreen h1 {
    font-size: 2rem;
    letter-spacing: 0.05em;
  }
  #startBtn {
    background: #fff;
    color: #0a0a0a;
    border: none;
    padding: 14px 40px;
    font-size: 1.1rem;
    font-weight: 700;
    border-radius: 40px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  #startBtn:hover { transform: scale(1.05); opacity: 0.9; }
  #loadingMsg {
    font-size: 0.95rem;
    color: #888;
    display: none;
  }
  #canvasWrap {
    display: none;
    position: relative;
    width: 100vw;
    height: 100vh;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
</style>
</head>
<body>

<div id="startScreen">
  <h1>🐶 치와와 필터</h1>
  <button id="startBtn">시작하기</button>
  <span id="loadingMsg">모델 로딩 중…</span>
  <span id="errorMsg" style="color:#ff6b6b;font-size:0.9rem;max-width:360px;text-align:center;display:none"></span>
</div>

<div id="canvasWrap">
  <canvas id="output"></canvas>
</div>

<video id="video" style="display:none" autoplay playsinline></video>

<script type="module">
import {
  FaceLandmarker,
  FilesetResolver,
  DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ── 랜드마크 인덱스 (MediaPipe 468점) ──────────────────────────
const IDX = {
  // 눈 외곽 (LEFT = 화면 오른쪽 눈)
  LEFT_EYE:  [33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246],
  RIGHT_EYE: [362,382,381,380,374,373,390,249,263,466,388,387,386,385,384,398],
  // 홍채 중심 대략
  LEFT_IRIS:  [468,469,470,471,472],
  RIGHT_IRIS: [473,474,475,476,477],
  // 눈썹
  LEFT_BROW:  [70,63,105,66,107,55,65,52,53,46],
  RIGHT_BROW: [300,293,334,296,336,285,295,282,283,276],
  // 코
  NOSE_TIP: [1,2,5,195,4,197,6,351,419,248,281,275,459,250,309,392,438,439,455,460,461,462,370,462,461,460,455,453,452,451,450,449,448,3,236,198,131,134,51,5],
  NOSE_TIP_CENTER: [4],
  NOSE_BRIDGE: [6, 197, 195, 5],
  // 입
  UPPER_LIP: [61,185,40,39,37,0,267,269,270,409,291],
  LOWER_LIP: [146,91,181,84,17,314,405,321,375,291],
  LIPS_ALL: [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146],
  MOUTH_OPEN_TOP: [13],
  MOUTH_OPEN_BOTTOM: [14],
  // 얼굴 윤곽
  FACE_OVAL: [10,338,297,332,284,251,389,356,454,323,361,288,397,365,379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109]
};

const video  = document.getElementById("video");
const canvas = document.getElementById("output");
const ctx    = canvas.getContext("2d");

// 치와와 이미지
const chiImg = new Image();
chiImg.src   = "Chihuahua.webp";


let faceLandmarker = null;
let running = false;

// ── 유틸 ──────────────────────────────────────────────────────
function lm(landmarks, idx) {
  return { x: landmarks[idx].x * canvas.width, y: landmarks[idx].y * canvas.height };
}

function bbox(landmarks, indices) {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const i of indices) {
    const p = landmarks[i];
    const x = p.x * canvas.width;
    const y = p.y * canvas.height;
    if (x < minX) minX = x;
    if (y < minY) minY = y;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  return { x: minX, y: minY, w: maxX - minX, h: maxY - minY, cx: (minX+maxX)/2, cy: (minY+maxY)/2 };
}

// ── 필터 렌더링 ────────────────────────────────────────────────
function drawFilter(landmarks) {
  const W = canvas.width, H = canvas.height;

  // 얼굴 전체 bbox
  const face = bbox(landmarks, IDX.FACE_OVAL);
  const leftEye  = bbox(landmarks, IDX.LEFT_EYE);
  const rightEye = bbox(landmarks, IDX.RIGHT_EYE);
  const noseTip  = lm(landmarks, IDX.NOSE_TIP_CENTER[0]);
  const lipBox   = bbox(landmarks, IDX.LIPS_ALL);
  const mouthTop = lm(landmarks, IDX.MOUTH_OPEN_TOP[0]);
  const mouthBot = lm(landmarks, IDX.MOUTH_OPEN_BOTTOM[0]);

  // 이마 기준점 (눈썹 위)
  const browLeft  = bbox(landmarks, IDX.LEFT_BROW);
  const browRight = bbox(landmarks, IDX.RIGHT_BROW);
  const foreheadY = Math.min(browLeft.y, browRight.y);
  const faceCX    = face.cx;

  // ── 1. 눈 확대 렌더링 — 정원(1:1) 강제 변환 ────────────────
  // 눈의 가로 비율 무시, 정원으로 늘려서 치와와 튀어나온 눈 표현
  for (const eyeBox of [leftEye, rightEye]) {
    const r = eyeBox.w * 1.3; // 가로폭 기준 반지름 → 세로로 늘어나 정원됨
    ctx.save();
    ctx.beginPath();
    ctx.arc(eyeBox.cx, eyeBox.cy, r, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(canvas,
      eyeBox.x - eyeBox.w * 0.1, eyeBox.y - eyeBox.h * 0.1,
      eyeBox.w * 1.2,            eyeBox.h * 1.2,
      eyeBox.cx - r,             eyeBox.cy - r,
      r * 2,                     r * 2
    );
    ctx.restore();
  }

  // ── 2. 치와와 귀 (삼각형, 큰 귀) ─────────────────────────
  const earW    = face.w * 0.45;
  const earH    = face.h * 0.75;
  // 정수리(landmark 10) 기준 - 귀 밑부분이 정수리에 붙고 위로 솟아오름
  const headTopY = lm(landmarks, 10).y;
  const earY    = headTopY - earH * 0.9;

  // 왼쪽 귀 (화면 기준)
  const earLX = faceCX - face.w * 0.38;
  drawEar(earLX, earY, earW, earH, -0.18, false);

  // 오른쪽 귀
  const earRX = faceCX + face.w * 0.38;
  drawEar(earRX, earY, earW, earH, 0.18, true);

  // ── 3. 까만 코 ──────────────────────────────────────────
  const noseW = face.w * 0.18;
  const noseH = face.h * 0.10;
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(noseTip.x, noseTip.y - noseH*0.1, noseW/2, noseH/2, 0, 0, Math.PI*2);
  ctx.fillStyle = "#111";
  ctx.fill();
  // 콧구멍 하이라이트
  ctx.beginPath();
  ctx.ellipse(noseTip.x - noseW*0.18, noseTip.y, noseW*0.13, noseH*0.28, -0.3, 0, Math.PI*2);
  ctx.ellipse(noseTip.x + noseW*0.18, noseTip.y, noseW*0.13, noseH*0.28, 0.3, 0, Math.PI*2);
  ctx.fillStyle = "#000";
  ctx.fill();
  // 코 반짝임
  ctx.beginPath();
  ctx.ellipse(noseTip.x - noseW*0.1, noseTip.y - noseH*0.25, noseW*0.07, noseH*0.1, -0.5, 0, Math.PI*2);
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.fill();
  ctx.restore();

  // ── 4. 이빨 (입이 벌어진 경우에만) ─────────────────────
  const mouthOpenness = mouthBot.y - mouthTop.y;
  if (mouthOpenness > face.h * 0.015) {
    drawTeeth(lipBox, mouthTop, mouthBot, mouthOpenness);
  }

  // ── 5. 얼굴 윤곽 살짝 왜곡 (스케일다운) ────────────────
  // 실제 왜곡은 CSS transform 보다 canvas clip으로 처리
  // (랜드마크 기반 필터가 이미 얼굴 위에 그려지므로 별도 처리 생략, 효과는 귀+눈 확대로 충분)
}

function drawEar(tipX, tipY, w, h, lean, flip) {
  ctx.save();
  ctx.translate(tipX, tipY + h);

  // ── 귀 외곽 경로 ──
  const makeOuterPath = () => {
    const p = new Path2D();
    p.moveTo(-w/2, 0);
    p.quadraticCurveTo(-w/2 + w*lean, -h*0.5, w*lean*0.5, -h);
    p.quadraticCurveTo(w/2 + w*lean, -h*0.5, w/2, 0);
    p.closePath();
    return p;
  };
  const outerPath = makeOuterPath();
  const tipCX = w * lean * 0.5;

  // 1) 기본 베이스 컬러 (짙은 갈색)
  ctx.fillStyle = "#7a4510";
  ctx.fill(outerPath);

  // 2) 광원 그라디언트: 왼쪽 위에서 빛이 들어오는 느낌
  const lightGrad = ctx.createLinearGradient(tipCX - w*0.3, -h, w*0.5, 0);
  lightGrad.addColorStop(0,   "#f0b060"); // 빛 받는 귀 끝
  lightGrad.addColorStop(0.35,"#d4903a"); // 중간 황갈
  lightGrad.addColorStop(0.7, "#a06020"); // 중간 어두운 면
  lightGrad.addColorStop(1,   "#5a3008"); // 가장자리 어두움
  ctx.fillStyle = lightGrad;
  ctx.fill(outerPath);

  // 3) 측면 앰비언트 오클루전 (양 가장자리를 어둡게)
  const sideGrad = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  sideGrad.addColorStop(0,    "rgba(0,0,0,0.45)");
  sideGrad.addColorStop(0.18, "rgba(0,0,0,0)");
  sideGrad.addColorStop(0.82, "rgba(0,0,0,0)");
  sideGrad.addColorStop(1,    "rgba(0,0,0,0.35)");
  ctx.fillStyle = sideGrad;
  ctx.fill(outerPath);

  // 4) 귀 끝 하이라이트 (반짝이는 털 느낌)
  const tipGrad = ctx.createRadialGradient(tipCX, -h, 0, tipCX, -h*0.7, h*0.45);
  tipGrad.addColorStop(0,   "rgba(255,220,140,0.55)");
  tipGrad.addColorStop(0.5, "rgba(255,200,100,0.15)");
  tipGrad.addColorStop(1,   "rgba(0,0,0,0)");
  ctx.fillStyle = tipGrad;
  ctx.fill(outerPath);

  // 5) 털 스트로크 (결정론적 sin/cos 값으로 프레임마다 안 흔들림)
  ctx.save();
  ctx.clip(outerPath);
  const numFur = 52;
  for (let i = 0; i < numFur; i++) {
    const t  = i / numFur;
    // 베이스 시작점: 하단 호를 따라 분포
    const bx = -w/2 + w * t;
    const by = 0;
    // 털 길이 & 방향: 귀 끝 방향으로 향하되 살짝 흔들
    const len    = h * (0.45 + Math.abs(Math.sin(i * 2.3)) * 0.35);
    const sway   = Math.sin(i * 3.7) * w * 0.07;
    const ex     = bx * (1 - len/h) + tipCX * (len/h) + sway;
    const ey     = -len;
    const mx     = (bx + ex) / 2 + Math.cos(i * 5.1) * w * 0.05;
    const my     = (by + ey) / 2;
    const alpha  = 0.13 + Math.abs(Math.sin(i * 1.9)) * 0.12;
    const dark   = i % 3 === 0; // 일부 털은 더 짙게
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(mx, my, ex, ey);
    ctx.strokeStyle = dark ? `rgba(50,22,3,${alpha*1.4})` : `rgba(80,38,8,${alpha})`;
    ctx.lineWidth = 0.6 + Math.abs(Math.sin(i * 4.1)) * 0.7;
    ctx.stroke();
  }
  ctx.restore();

  // 6) 외곽 테두리 (얇고 어두운 윤곽선)
  ctx.strokeStyle = "#3a1c04";
  ctx.lineWidth = 1.5;
  ctx.stroke(outerPath);

  // ── 안쪽 귀 (핑크 입체) ──
  const is = 0.55; // inner scale
  const innerPath = new Path2D();
  innerPath.moveTo(-w/2 * is, -h * 0.08);
  innerPath.quadraticCurveTo((-w/2 + w*lean)*is, -h*0.5, tipCX*is, -h*0.87);
  innerPath.quadraticCurveTo((w/2 + w*lean)*is,  -h*0.5, w/2*is,  -h*0.08);
  innerPath.closePath();

  // 기본 핑크
  const pinkGrad = ctx.createLinearGradient(tipCX*is, -h*0.87, 0, -h*0.08);
  pinkGrad.addColorStop(0,   "#ffb8c8"); // 밝은 끝
  pinkGrad.addColorStop(0.45,"#e8788a"); // 중간 진한 핑크
  pinkGrad.addColorStop(1,   "#c05068"); // 어두운 기저
  ctx.fillStyle = pinkGrad;
  ctx.fill(innerPath);

  // 안쪽 광택 하이라이트
  const pinkHL = ctx.createRadialGradient(tipCX*is*0.4, -h*0.52, 0, tipCX*is*0.4, -h*0.52, w*0.22);
  pinkHL.addColorStop(0,   "rgba(255,255,255,0.45)");
  pinkHL.addColorStop(0.6, "rgba(255,255,255,0.1)");
  pinkHL.addColorStop(1,   "rgba(255,255,255,0)");
  ctx.fillStyle = pinkHL;
  ctx.fill(innerPath);

  ctx.restore();
}

function drawTeeth(lipBox, mouthTop, mouthBot, openness) {
  const tx = lipBox.x;
  const ty = mouthTop.y;
  const tw = lipBox.w;
  const numTeeth = 6;
  const toothW   = tw / numTeeth;
  const toothH   = Math.min(openness * 0.82, lipBox.h * 0.68);

  ctx.save();
  ctx.beginPath();
  ctx.rect(tx - 2, ty - 6, tw + 4, openness + 6);
  ctx.clip();

  // 잇몸 (치아 위 핑크 살)
  const gumGrad = ctx.createLinearGradient(0, ty - 6, 0, ty + 4);
  gumGrad.addColorStop(0, "#b03050");
  gumGrad.addColorStop(1, "#d05070");
  ctx.fillStyle = gumGrad;
  ctx.fillRect(tx - 2, ty - 6, tw + 4, 10);

  for (let i = 0; i < numTeeth; i++) {
    const x0 = tx + i * toothW + 1;
    const x1 = x0 + toothW - 2;
    const cx = (x0 + x1) / 2;

    // 치아 경로
    const tooth = new Path2D();
    tooth.moveTo(x0, ty);
    tooth.lineTo(x0, ty + toothH * 0.62);
    tooth.quadraticCurveTo(cx, ty + toothH, x1, ty + toothH * 0.62);
    tooth.lineTo(x1, ty);
    tooth.closePath();

    // 1) 기본 아이보리 베이스
    ctx.fillStyle = "#f0ece0";
    ctx.fill(tooth);

    // 2) 좌우 명암 (원기둥 느낌)
    const sideGrad = ctx.createLinearGradient(x0, 0, x1, 0);
    sideGrad.addColorStop(0,    "rgba(0,0,0,0.28)");   // 왼쪽 그림자
    sideGrad.addColorStop(0.22, "rgba(0,0,0,0)");
    sideGrad.addColorStop(0.5,  "rgba(255,255,255,0.38)"); // 중앙 하이라이트
    sideGrad.addColorStop(0.78, "rgba(0,0,0,0)");
    sideGrad.addColorStop(1,    "rgba(0,0,0,0.22)");   // 오른쪽 그림자
    ctx.fillStyle = sideGrad;
    ctx.fill(tooth);

    // 3) 상하 명암 (위가 밝고 끝이 어두움)
    const vertGrad = ctx.createLinearGradient(0, ty, 0, ty + toothH);
    vertGrad.addColorStop(0,   "rgba(255,255,255,0.5)");
    vertGrad.addColorStop(0.2, "rgba(255,255,255,0)");
    vertGrad.addColorStop(0.75,"rgba(0,0,0,0)");
    vertGrad.addColorStop(1,   "rgba(0,0,0,0.3)");
    ctx.fillStyle = vertGrad;
    ctx.fill(tooth);

    // 4) 스페큘러 하이라이트 (작은 흰 타원)
    ctx.save();
    ctx.clip(tooth);
    const hlGrad = ctx.createRadialGradient(cx - toothW*0.08, ty + toothH*0.12, 0,
                                             cx - toothW*0.08, ty + toothH*0.12, toothW*0.28);
    hlGrad.addColorStop(0,   "rgba(255,255,255,0.75)");
    hlGrad.addColorStop(0.5, "rgba(255,255,255,0.2)");
    hlGrad.addColorStop(1,   "rgba(255,255,255,0)");
    ctx.fillStyle = hlGrad;
    ctx.fillRect(x0, ty, toothW, toothH);
    ctx.restore();

    // 5) 치아 윤곽 (얇고 어두운 선)
    ctx.strokeStyle = "rgba(100,85,65,0.5)";
    ctx.lineWidth = 0.8;
    ctx.stroke(tooth);

    // 6) 치아 사이 어두운 홈
    ctx.beginPath();
    ctx.moveTo(x1 + 0.4, ty);
    ctx.lineTo(x1 + 0.4, ty + toothH * 0.55);
    ctx.strokeStyle = "rgba(40,20,10,0.55)";
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  ctx.restore();
}

// ── 프레임 루프 ────────────────────────────────────────────────
let lastVideoTime = -1;

async function renderLoop() {
  if (!running) return;

  if (video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;

    // 좌우 반전 (거울 모드)
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
    ctx.restore();

    const result = faceLandmarker.detectForVideo(video, performance.now());

    if (result.faceLandmarks && result.faceLandmarks.length > 0) {
      for (const landmarks of result.faceLandmarks) {
        // 랜드마크도 좌우 반전 보정
        const mirrored = landmarks.map(p => ({ ...p, x: 1 - p.x }));
        drawFilter(mirrored);
      }
    }
  }

  requestAnimationFrame(renderLoop);
}

// ── 초기화 ────────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.style.display = "block";
  document.getElementById("loadingMsg").style.display = "none";
  document.getElementById("startBtn").disabled = false;
  document.getElementById("startBtn").textContent = "다시 시도";
}

function setStatus(msg) {
  document.getElementById("loadingMsg").textContent = msg;
}

document.getElementById("startBtn").addEventListener("click", async () => {
  const btn = document.getElementById("startBtn");
  btn.disabled = true;
  document.getElementById("loadingMsg").style.display = "block";
  document.getElementById("errorMsg").style.display = "none";

  try {
    setStatus("① WASM 로딩 중… (jsdelivr CDN)");
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
    );

    setStatus("② 얼굴 인식 모델 다운로드 중… (약 4MB, 잠시 기다려 주세요)");
    // GPU 먼저 시도, 실패하면 CPU로 폴백
    try {
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numFaces: 2,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: false
      });
    } catch (gpuErr) {
      console.warn("GPU 초기화 실패, CPU로 재시도:", gpuErr);
      setStatus("② GPU 불가 → CPU 모드로 재시도 중…");
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
          delegate: "CPU"
        },
        runningMode: "VIDEO",
        numFaces: 2,
        outputFaceBlendshapes: false,
        outputFacialTransformationMatrixes: false
      });
    }

    setStatus("③ 카메라 연결 중…");
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }
      });
    } catch (camErr) {
      showError("카메라 접근이 거부됐어요. 브라우저 주소창 옆 카메라 아이콘을 눌러 허용해 주세요.");
      return;
    }

    video.srcObject = stream;
    await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("canvasWrap").style.display  = "block";

    running = true;
    renderLoop();
  } catch (err) {
    console.error(err);
    showError(`오류 발생: ${err.message}\n\n네트워크 문제라면 잠시 후 다시 시도해 주세요. file:// 로 열었다면 로컬 서버(python3 -m http.server)가 필요해요.`);
  }
});
</script>
</body>
</html>
